name: ci 
on:
  push:
    branches:
      - master 
      - main
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV 
      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-
      - name: Install required packages
        run: pip install "mkdocs<2.0.0" "mkdocs-macros-plugin" "pymdown-extensions" "mkdocs-statistics-plugin" "neoteroi-mkdocs"
      - run: pip install mkdocs-material mkdocs-material-extensions
      - run: pip install --upgrade nbconvert ipywidgets
      - run: pip install mkdocs-git-revision-date-localized-plugin
      - run: pip install mkdocs-git-authors-plugin
      - run: pip install mkdocs mkdocs-glightbox
      # - run: pip install mkdocs-rss-plugin
      - run: pip install mkdocs-material 
      # - run: pip install mkdocs-jupyter
      - run: mkdocs gh-deploy --force